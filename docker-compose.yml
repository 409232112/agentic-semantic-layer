version: '3.8'

services:
  # 1. Trino 联邦网关
  trino:
    image: trinodb/trino:latest
    container_name: trino-coordinator
    ports:
      - "8080:8080"
    environment:
      - CATALOG_MANAGEMENT=dynamic
    volumes:
      - ./trino-catalog:/etc/trino/catalog
    restart: always

  # 2. Node.js 应用服务 (Next.js)
  nodejs:
    image: semantic:latest
    container_name: semantic-console
    ports:
      - "3000:3000"
    environment:
      - TRINO_URL=http://trino:8080
      - NODE_ENV=production
    volumes:
      # 挂载宿主机的 data/semantic_config.json
      - ./data/semantic_config.json:/app/data/semantic_config.json
    depends_on:
      - trino
    restart: always
